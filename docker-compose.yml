version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=your-secret-key
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://pikman:pikman@db:5432/pikman_ai
    depends_on:
      - redis
      - db
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - pikman-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    networks:
      - pikman-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pikman-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=pikman
      - POSTGRES_PASSWORD=pikman
      - POSTGRES_DB=pikman_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pikman-network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  pikman-network:
    driver: bridge
